<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer - Futsal Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/form.css" />
  </head>
  <body data-page="customer">
    <div class="app-shell">
      <div class="page-shell">
        <section class="page-header">
          <div>
            <h2>Customer</h2>
            <p>Kelola data pelanggan, pencarian, dan status keanggotaan</p>
          </div>
          <div class="btn-group">
            <button class="btn btn-primary" data-toast data-toast-title="Customer" data-toast-text="Data customer berhasil disimpan." data-toast-type="success"><i class="fa-solid fa-plus"></i> Tambah Data</button>
            <button class="btn btn-info"><i class="fa-solid fa-magnifying-glass"></i> Cari</button>
            <button class="btn btn-outline"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
          </div>
        </section>
        <section class="grid-2">
          <article class="card">
            <h3 class="panel-title">Form Customer</h3>
            <p class="panel-sub">Input data pelanggan baru dengan validasi sederhana.</p>
            <form id="customerForm" class="form-grid" style="margin-top:12px;">
              <input type="hidden" id="customerId" />
              <div class="field"><label>Nama Lengkap</label><input id="customerName" type="text" placeholder="Masukkan nama pelanggan" required /></div>
              <div class="field"><label>No. Telepon</label><input id="customerPhone" type="text" placeholder="08xxxxxxxxxx" required /></div>
              <div class="field"><label>Email</label><input id="customerEmail" type="email" placeholder="contoh@email.com" required /></div>
              <div class="field"><label>Status Membership</label><select id="customerStatus"><option value="Member">Member</option><option value="Regular">Regular</option><option value="VIP">VIP</option></select></div>
              <div class="field" style="grid-column:1 / -1;"><label>Alamat</label><textarea id="customerAddress" rows="3" placeholder="Alamat lengkap pelanggan"></textarea></div>
              <div class="btn-group" style="margin-top:6px; grid-column:1 / -1;">
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Simpan</button>
                <button type="reset" class="btn btn-outline"><i class="fa-solid fa-xmark"></i> Batal</button>
              </div>
            </form>
          </article>
          <article class="card">
            <h3 class="panel-title">Pencarian Customer</h3>
            <p class="panel-sub">Cari berdasarkan nama, email, atau status</p>
            <div class="field" style="margin-top:10px;"><label>Cari</label><input id="customerSearch" type="search" placeholder="Ketik nama / email / status" /></div>
            <div class="filter-row" style="margin-top:10px;">
              <button class="filter-chip active" data-status="All">Semua</button>
              <button class="filter-chip" data-status="Member">Member</button>
              <button class="filter-chip" data-status="Regular">Regular</button>
              <button class="filter-chip" data-status="VIP">VIP</button>
            </div>
          </article>
        </section>
        <article class="card">
          <div class="action-row">
            <div>
              <h3 class="panel-title">Tabel Customer</h3>
              <p class="panel-sub">Daftar pelanggan yang telah terdaftar</p>
            </div>
            <div class="btn-group"><button class="btn btn-warning"><i class="fa-solid fa-file-export"></i> Export</button></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>ID</th><th>Nama</th><th>Email</th><th>No. HP</th><th>Status Membership</th><th>Aksi</th></tr></thead>
              <tbody id="customerTableBody"></tbody>
            </table>
          </div>
        </article>
      </div>
    </div>
    <script src="../js/main.js"></script>
    <script src="../js/customer.js"></script>
  </body>
</html>
