<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapangan - Futsal Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/form.css" />
  </head>
  <body data-page="field">
    <div class="app-shell">
      <div class="page-shell">
        <section class="page-header">
          <div>
            <h2>Lapangan</h2>
            <p>Kelola jenis lapangan, status, dan kapasitas penyewaan</p>
          </div>
          <div class="btn-group"><button class="btn btn-primary"><i class="fa-solid fa-plus"></i> Tambah Data</button><button class="btn btn-outline"><i class="fa-solid fa-rotate-right"></i> Refresh</button></div>
        </section>
        <section class="grid-2">
          <article class="card">
            <h3 class="panel-title">Form Lapangan</h3>
            <form id="fieldForm" class="form-grid" style="margin-top:10px;">
              <input type="hidden" id="fieldId" />
              <div class="field"><label>Nama Lapangan</label><input id="fieldName" type="text" placeholder="A1 / B2" required /></div>
              <div class="field"><label>Jenis</label><select id="fieldType"><option>Indoor</option><option>Outdoor</option></select></div>
              <div class="field"><label>Harga / Jam</label><input id="fieldPrice" type="text" placeholder="Rp 120.000" required /></div>
              <div class="field"><label>Kapasitas</label><input id="fieldCapacity" type="number" value="5" required /></div>
              <div class="field"><label>Status</label><select id="fieldStatus"><option>Aktif</option><option>Maintenance</option></select></div>
              <div class="field" style="grid-column:1 / -1;"><label>Catatan</label><textarea id="fieldNote" rows="3" placeholder="Kondisi, fasilitas, atau catatan lain"></textarea></div>
              <div class="btn-group" style="margin-top:6px; grid-column:1 / -1;"><button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Simpan</button><button type="reset" class="btn btn-outline"><i class="fa-solid fa-xmark"></i> Batal</button></div>
            </form>
          </article>
          <article class="card">
            <h3 class="panel-title">Cari Lapangan</h3>
            <div class="field" style="margin-top:10px;"><label>Cari</label><input id="fieldSearch" type="search" placeholder="Cari nama / jenis / status" /></div>
            <div class="status-grid" style="margin-top:12px;">
              <div class="status-item"><strong>Lapangan A</strong><span class="badge success">Tersedia</span></div>
              <div class="status-item"><strong>Lapangan B</strong><span class="badge warning">Maintenance</span></div>
              <div class="status-item"><strong>Lapangan C</strong><span class="badge info">Booking penuh</span></div>
            </div>
          </article>
        </section>
        <article class="card"><div class="action-row"><div><h3 class="panel-title">Tabel Lapangan</h3><p class="panel-sub">Daftar lapangan yang tersedia untuk disewa</p></div><button class="btn btn-info"><i class="fa-solid fa-filter"></i> Filter</button></div><div class="table-wrap"><table><thead><tr><th>ID Lapangan</th><th>Nama Lapangan</th><th>Harga/Jam</th><th>Kapasitas</th><th>Jenis Lapangan</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="fieldTableBody"></tbody></table></div></article>
      </div>
    </div>
    <script src="../js/main.js"></script>
    <script src="../js/field.js"></script>
  </body>
</html>
